  <title>LNPRJ05 — 星空互動</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {

    video { display: none; }
  </style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<video id="vid" playsinline></video>

<!-- Camera preview -->
<div id="cam-wrap">
  <canvas id="cam-canvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <span id="hand-indicator"></span>揮手讓星星流動
</div>

<!-- Title -->
<div id="badge">LNPRJ · 星空互動</div>

<!-- Permission overlay -->
<div id="overlay">
  <div class="ov-icon">✨</div>
  <div class="ov-title">用手<span>撥動星空</span></div>
  <p class="ov-desc">開啟攝影鏡頭，把手舉到鏡頭前慢慢揮動——星星和極光會跟著你的手勢流動。</p>

  <div class="ov-hints">
    <div class="ov-hint"><span>🖐️</span>張開手掌</div>
    <div class="ov-hint"><span>👋</span>緩慢揮動</div>
    <div class="ov-hint"><span>💫</span>看星星流動</div>
  </div>

  <button id="start-btn">開啟鏡頭 · 開始體驗</button>
  <p class="ov-privacy">攝影鏡頭僅在本機處理，畫面不會上傳或儲存</p>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ─────────────────────────────────────────────
//  Canvas setup
// ─────────────────────────────────────────────
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Reinit star positions on resize
  if (stars.length > 0) {
    stars.forEach(s => {
      // Keep proportional position
      s.ox = s.ox / (s._prevW || W) * W;
      s.oy = s.oy / (s._prevH || H) * H;
      s.x = s.ox;
      s.y = s.oy;
    });
  }
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
//  Stars
// ─────────────────────────────────────────────
const STAR_COUNT = 320;
let stars = [];

function initStars() {
  stars = Array.from({ length: STAR_COUNT }, () => {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const sizeRaw = Math.random();
    return {
      x, y,
      ox: x, oy: y,        // origin (rest position)
      vx: 0, vy: 0,
      size: sizeRaw ** 2 * 3 + 0.2,
      baseAlpha: Math.random() * 0.55 + 0.35,
      twinklePhase: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.018 + 0.004,
      color: weightedColor(),
      _prevW: W, _prevH: H,
    };
  });
}

function weightedColor() {
  const r = Math.random();
  if (r < 0.65) return '#ffffff';
  if (r < 0.78) return '#cce8ff';
  if (r < 0.88) return '#ffe8cc';
  return '#e8ccff';
}

initStars();

// ─────────────────────────────────────────────
//  Aurora layers
// ─────────────────────────────────────────────
const AURORA = [
  { r: 0,   g: 230, b: 140, yFrac: 0.17, amp: 0.055, freq: 0.0022, speed: 0.25, op: 0.20 },
  { r: 0,   g: 150, b: 255, yFrac: 0.25, amp: 0.048, freq: 0.0030, speed: 0.18, op: 0.16 },
  { r: 160, g: 40,  b: 255, yFrac: 0.11, amp: 0.065, freq: 0.0018, speed: 0.13, op: 0.12 },
  { r: 0,   g: 255, b: 200, yFrac: 0.21, amp: 0.038, freq: 0.0040, speed: 0.35, op: 0.09 },
];

let auroraShift = 0;  // shifts with hand velocity

// ─────────────────────────────────────────────
//  Hand tracking state
// ─────────────────────────────────────────────
let handX = -1, handY = -1;
let prevHandX = -1, prevHandY = -1;
let velX = 0, velY = 0;
let handActive = false;
let handLostFrames = 0;

const INFLUENCE_R_FRAC = 0.22;  // influence radius as fraction of min(W,H)

// ─────────────────────────────────────────────
//  Physics constants
// ─────────────────────────────────────────────
const SPRING  = 0.032;
const DAMPING = 0.875;
const PUSH    = 11;

// ─────────────────────────────────────────────
//  Render loop
// ─────────────────────────────────────────────
let time = 0;

function drawAurora() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  AURORA.forEach(layer => {
    const cy = H * layer.yFrac;
    const bandH = H * 0.28;

    ctx.beginPath();
    ctx.moveTo(0, cy - bandH * 0.5);
    for (let x = 0; x <= W + 8; x += 6) {
      const y = cy + Math.sin(x * layer.freq + time * layer.speed + auroraShift * 0.006) * H * layer.amp;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, cy + bandH);
    ctx.lineTo(0, cy + bandH);
    ctx.closePath();

    const g = ctx.createLinearGradient(0, cy - bandH * 0.3, 0, cy + bandH);
    const { r, gr: gv, b } = { gr: layer.g, ...layer };
    g.addColorStop(0,    `rgba(${layer.r},${layer.g},${layer.b},0)`);
    g.addColorStop(0.25, `rgba(${layer.r},${layer.g},${layer.b},${layer.op})`);
    g.addColorStop(0.65, `rgba(${layer.r},${layer.g},${layer.b},${layer.op * 0.5})`);
    g.addColorStop(1,    `rgba(${layer.r},${layer.g},${layer.b},0)`);
    ctx.fillStyle = g;
    ctx.fill();
  });

  ctx.restore();
}

function updateAndDrawStars() {
  const R = Math.min(W, H) * INFLUENCE_R_FRAC;

  stars.forEach(s => {
    // Hand push
    if (handActive && handX > 0) {
      const dx = s.x - handX;
      const dy = s.y - handY;
      const dist2 = dx * dx + dy * dy;
      if (dist2 < R * R) {
        const dist = Math.sqrt(dist2);
        const t = 1 - dist / R;
        const f = t * t * PUSH;
        s.vx += velX * f;
        s.vy += velY * f;
      }
    }

    // Spring to origin
    s.vx += (s.ox - s.x) * SPRING;
    s.vy += (s.oy - s.y) * SPRING;

    // Damping
    s.vx *= DAMPING;
    s.vy *= DAMPING;

    // Integrate
    s.x += s.vx;
    s.y += s.vy;

    // Twinkling
    s.twinklePhase += s.twinkleSpeed;
    const tw = 0.75 + Math.sin(s.twinklePhase) * 0.25;
    const alpha = s.baseAlpha * tw;

    // Draw star
    ctx.globalAlpha = alpha;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * tw, 0, Math.PI * 2);
    ctx.fill();

    // Soft glow for bigger stars
    if (s.size > 1.4) {
      ctx.globalAlpha = alpha * 0.12;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 5, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  ctx.globalAlpha = 1;
}

function drawHandGlow() {
  if (!handActive || handX < 0) return;
  const speed = Math.sqrt(velX * velX + velY * velY);
  const intensity = Math.min(speed * 0.012, 0.10);
  if (intensity < 0.005) return;

  const R = Math.min(W, H) * INFLUENCE_R_FRAC;
  const g = ctx.createRadialGradient(handX, handY, 0, handX, handY, R);
  g.addColorStop(0,   `rgba(180, 210, 255, ${intensity})`);
  g.addColorStop(0.4, `rgba(100, 160, 255, ${intensity * 0.4})`);
  g.addColorStop(1,   'transparent');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(handX, handY, R, 0, Math.PI * 2);
  ctx.fill();
}

function render() {
  // Background
  ctx.clearRect(0, 0, W, H);
  const bg = ctx.createRadialGradient(W / 2, H * 0.4, 0, W / 2, H * 0.4, Math.max(W, H) * 0.75);
  bg.addColorStop(0, '#080d1a');
  bg.addColorStop(1, '#020408');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Aurora
  auroraShift += velX * 0.25;
  auroraShift *= 0.98;  // decay
  drawAurora();

  // Stars
  updateAndDrawStars();

  // Hand glow
  drawHandGlow();

  time += 0.01;

  // Decay velocity when hand lost
  if (!handActive) {
    velX *= 0.9;
    velY *= 0.9;
  }

  requestAnimationFrame(render);
}

render();

// ─────────────────────────────────────────────
//  MediaPipe + Camera
// ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startExperience);

async function startExperience() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('cam-wrap').style.display = 'block';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('badge').style.display = 'block';

  const vid = document.getElementById('vid');

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.55,
  });

  hands.onResults(onHandResults);

  const camera = new Camera(vid, {
    onFrame: async () => {
      await hands.send({ image: vid });
    },
    width: 640,
    height: 480,
  });

  camera.start();
}

// Palm landmark indices
const PALM_IDX = [0, 5, 9, 13, 17];

function onHandResults(results) {
  prevHandX = handX;
  prevHandY = handY;

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handActive = true;
    handLostFrames = 0;

    const lm = results.multiHandLandmarks[0];

    // Palm center = average of wrist + 4 finger bases
    let sx = 0, sy = 0;
    PALM_IDX.forEach(i => { sx += lm[i].x; sy += lm[i].y; });
    const px = sx / PALM_IDX.length;
    const py = sy / PALM_IDX.length;

    // Mirror X so movement feels natural
    handX = (1 - px) * W;
    handY = py * H;

    // Smoothed velocity
    if (prevHandX > 0) {
      velX = velX * 0.45 + (handX - prevHandX) * 0.55;
      velY = velY * 0.45 + (handY - prevHandY) * 0.55;
    }

    // Update hand indicator
    document.getElementById('hand-indicator').style.opacity = '1';

    // Draw camera preview
    drawCamPreview(results.multiHandLandmarks[0]);
  } else {
    handLostFrames++;
    if (handLostFrames > 6) {
      handActive = false;
      document.getElementById('hand-indicator').style.opacity = '0';
    }
  }
}

// ─────────────────────────────────────────────
//  Camera preview
// ─────────────────────────────────────────────
const camCanvas = document.getElementById('cam-canvas');
const camCtx = camCanvas.getContext('2d');

function drawCamPreview(landmarks) {
  const vid = document.getElementById('vid');
  const PW = 130, PH = 98;
  camCanvas.width = PW;
  camCanvas.height = PH;

  // Mirrored video frame
  camCtx.save();
  camCtx.translate(PW, 0);
  camCtx.scale(-1, 1);
  camCtx.drawImage(vid, 0, 0, PW, PH);
  camCtx.restore();

  // Overlay hand skeleton
  if (landmarks) {
    // Connections
    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17]
    ];
    camCtx.strokeStyle = 'rgba(0, 255, 120, 0.5)';
    camCtx.lineWidth = 1;
    CONNECTIONS.forEach(([a, b]) => {
      const ax = (1 - landmarks[a].x) * PW;
      const ay = landmarks[a].y * PH;
      const bx = (1 - landmarks[b].x) * PW;
      const by = landmarks[b].y * PH;
      camCtx.beginPath();
      camCtx.moveTo(ax, ay);
      camCtx.lineTo(bx, by);
      camCtx.stroke();
    });

    // Dots
    landmarks.forEach(pt => {
      camCtx.fillStyle = 'rgba(0, 255, 120, 0.85)';
      camCtx.beginPath();
      camCtx.arc((1 - pt.x) * PW, pt.y * PH, 2, 0, Math.PI * 2);
      camCtx.fill();
    });
  }
}
</script>

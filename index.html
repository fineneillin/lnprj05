<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LNPRJ05 — 星空互動</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #01030a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
    }

    #star-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Overlay — semi-transparent so aurora shows through immediately */
    #overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0, 0, 8, 0.10);
      backdrop-filter: none;
      gap: 1.4rem; text-align: center; padding: 2rem;
    }
    .ov-icon { font-size: 3.2rem; line-height: 1; }
    .ov-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800; color: #e6edf3; letter-spacing: -.02em;
    }
    .ov-title span {
      background: linear-gradient(130deg, #7fffd4 0%, #c8a8ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ov-desc { color: rgba(255,255,255,.55); max-width: 380px; line-height: 1.75; font-size: .92rem; }
    .ov-hints { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .ov-hint {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: .55rem 1rem;
      font-size: .78rem; color: rgba(255,255,255,.55);
    }
    .ov-hint span { display: block; font-size: 1.1rem; margin-bottom: .15rem; }
    #start-btn {
      background: rgba(0,255,100,.1); border: 1px solid rgba(0,255,100,.3);
      color: #7fffd4; padding: .85rem 2.8rem;
      border-radius: 50px; font-size: .95rem;
      cursor: pointer; transition: all .2s; letter-spacing: .04em;
    }
    #start-btn:hover { background: rgba(0,255,100,.18); border-color: rgba(0,255,100,.5); transform: scale(1.03); }
    #start-btn:disabled { opacity: .5; transform: none; cursor: default; }
    .ov-privacy { font-size: .7rem; color: rgba(255,255,255,.18); }

    #cam-wrap {
      position: fixed; bottom: 1.5rem; right: 1.5rem;

    }
    #cam-canvas { width: 130px; display: block; }

    #hud {
      position: fixed; bottom: 1.5rem; left: 230px;
      color: rgba(255,255,255,.25); font-size: .72rem;
      line-height: 2; z-index: 10; display: none;
    }
    #hand-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #00ff64;
      margin-right: .4rem; vertical-align: middle;
      opacity: 0; transition: opacity .3s;
      box-shadow: 0 0 6px #00ff64;
    }
    #badge {
      position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.1); font-size: .7rem;
      letter-spacing: .2em; text-transform: uppercase;
      z-index: 10; pointer-events: none; display: none;
    }
    video { display: none; }
  </style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<video id="vid" playsinline></video>
<div id="cam-wrap"><canvas id="cam-canvas"></canvas></div>
<div id="hud"><span id="hand-dot"></span>揮手讓星星流動</div>
<div id="badge">LNPRJ · 星空互動</div>

<div id="overlay">
  <div class="ov-icon">✨</div>
  <div class="ov-title">用手<span>撥動星空</span></div>
  <p class="ov-desc">開啟攝影鏡頭，把手舉到鏡頭前慢慢揮動——星星和極光會跟著你的手勢流動。</p>
  <div class="ov-hints">
    <div class="ov-hint"><span>🖐️</span>張開手掌</div>
    <div class="ov-hint"><span>👋</span>緩慢揮動</div>
    <div class="ov-hint"><span>💫</span>看星星流動</div>
  </div>
  <button id="start-btn">開啟鏡頭 · 開始體驗</button>
  <p class="ov-privacy">攝影鏡頭僅在本機處理，畫面不會上傳或儲存</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════
//  Canvas + resize
// ═══════════════════════════════════════════
const canvas = document.getElementById('star-canvas');
const ctx    = canvas.getContext('2d');
let W, H;

const STAR_COUNT = 3000;
let stars = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initStars(); });

// ═══════════════════════════════════════════
//  Stars — small, dense, realistic
// ═══════════════════════════════════════════
function randGaussian() {
  // Box-Muller
  const u = 1 - Math.random(), v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function initStars() {
  stars = Array.from({ length: STAR_COUNT }, () => {
    const x = Math.random() * W;
    const y = Math.random() * H;
    // Bias toward smaller sizes (most stars tiny)
    const mag = Math.random();
    const size = mag < 0.55 ? Math.random() * 0.6 + 0.25   // dim — small dots
               : mag < 0.82 ? Math.random() * 0.7 + 0.65   // medium
               :               Math.random() * 0.9 + 1.2;   // bright — more common

    // Color: mostly blue-white, some warm, some pure white
    const cr = Math.random();
    const color = cr < 0.5  ? '#ffffff'
                : cr < 0.72 ? '#cce8ff'   // blue-white
                : cr < 0.86 ? '#fff4e0'   // warm white
                :              '#e8d8ff'; // faint violet

    return {
      x, y, ox: x, oy: y,
      vx: 0, vy: 0,
      size,
      baseAlpha: 0.5 + Math.random() * 0.5,
      twinklePhase: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.012 + 0.002,
      color,
      isBright: size > 1.0,
    };
  });
}
initStars();

// ═══════════════════════════════════════════
//  Aurora — vivid, curtain-like
// ═══════════════════════════════════════════
// Aurora sits in the upper ~45% of the screen
const AURORA_LAYERS = [
  // [r, g, b, yFrac-center, amplitude, xFreq, timeSpeed, opacity, width]
  { r:   0, g: 255, b:  80, yC: 0.22, amp: 0.055, xf: 0.0018, ts: 0.20, op: 0.85, bw: 0.42 },
  { r:   0, g: 230, b: 120, yC: 0.30, amp: 0.045, xf: 0.0025, ts: 0.28, op: 0.65, bw: 0.34 },
  { r: 140, g:   0, b: 255, yC: 0.14, amp: 0.060, xf: 0.0015, ts: 0.14, op: 0.50, bw: 0.32 },
  { r: 255, g:   0, b: 180, yC: 0.09, amp: 0.040, xf: 0.0030, ts: 0.35, op: 0.35, bw: 0.26 },
  { r:   0, g: 180, b: 255, yC: 0.26, amp: 0.035, xf: 0.0035, ts: 0.42, op: 0.38, bw: 0.24 },
  { r:  80, g: 255, b: 160, yC: 0.18, amp: 0.050, xf: 0.0020, ts: 0.25, op: 0.30, bw: 0.20 },
];

let auroraShift = 0;

function drawAurora(time) {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  AURORA_LAYERS.forEach(l => {
    const cy    = H * l.yC;
    const bh    = H * l.bw;   // band height
    const step  = 4;

    ctx.beginPath();
    ctx.moveTo(0, 0);

    for (let x = 0; x <= W + step; x += step) {
      const wave = Math.sin(x * l.xf + time * l.ts + auroraShift * 0.004) * H * l.amp
                 + Math.sin(x * l.xf * 2.3 + time * l.ts * 1.7) * H * l.amp * 0.3;
      const y = cy + wave;
      ctx.lineTo(x, y);
    }

    // Close path downward through band
    for (let x = W; x >= 0; x -= step) {
      const wave = Math.sin(x * l.xf + time * l.ts + auroraShift * 0.004) * H * l.amp
                 + Math.sin(x * l.xf * 2.3 + time * l.ts * 1.7) * H * l.amp * 0.3;
      const y = cy + wave + bh;
      ctx.lineTo(x, y);
    }
    ctx.closePath();

    // Vertical gradient: bright in middle, fade top+bottom
    const midY = cy + bh * 0.3;
    const grad = ctx.createLinearGradient(0, cy - bh * 0.2, 0, cy + bh);
    grad.addColorStop(0,    `rgba(${l.r},${l.g},${l.b},0)`);
    grad.addColorStop(0.15, `rgba(${l.r},${l.g},${l.b},${l.op * 0.5})`);
    grad.addColorStop(0.4,  `rgba(${l.r},${l.g},${l.b},${l.op})`);
    grad.addColorStop(0.7,  `rgba(${l.r},${l.g},${l.b},${l.op * 0.5})`);
    grad.addColorStop(1,    `rgba(${l.r},${l.g},${l.b},0)`);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // Extra bright core stripe for the main green
  ctx.globalCompositeOperation = 'screen';
  const mainL = AURORA_LAYERS[0];
  const coreH = H * 0.012;
  ctx.beginPath();
  for (let x = 0; x <= W + 4; x += 4) {
    const wave = Math.sin(x * mainL.xf + auroraShift * 0.004) * H * mainL.amp
               + Math.sin(x * mainL.xf * 2.3) * H * mainL.amp * 0.3;
    const y = H * mainL.yC + wave;
    if (x === 0) ctx.moveTo(x, y - coreH);
    else ctx.lineTo(x, y - coreH);
  }
  for (let x = W; x >= 0; x -= 4) {
    const wave = Math.sin(x * mainL.xf + auroraShift * 0.004) * H * mainL.amp
               + Math.sin(x * mainL.xf * 2.3) * H * mainL.amp * 0.3;
    const y = H * mainL.yC + wave;
    ctx.lineTo(x, y + coreH);
  }
  ctx.closePath();
  const cg = ctx.createLinearGradient(0, 0, 0, H * 0.5);
  cg.addColorStop(0, 'rgba(0,255,80,0)');
  cg.addColorStop(0.5, 'rgba(180,255,180,0.6)');
  cg.addColorStop(1, 'rgba(0,255,80,0)');
  ctx.fillStyle = cg;
  ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════
//  Hand tracking state
// ═══════════════════════════════════════════
let handX = -1, handY = -1;
let prevHandX = -1, prevHandY = -1;
let velX = 0, velY = 0;
let handActive = false;
let handLostFrames = 0;

const INFLUENCE_R_FRAC = 0.20;
const SPRING  = 0.030;
const DAMPING = 0.880;
const PUSH    = 10;

function updateStars() {
  const R = Math.min(W, H) * INFLUENCE_R_FRAC;

  stars.forEach(s => {
    if (handActive && handX > 0) {
      const dx = s.x - handX, dy = s.y - handY;
      const d2 = dx * dx + dy * dy;
      if (d2 < R * R) {
        const t = 1 - Math.sqrt(d2) / R;
        const f = t * t * PUSH;
        s.vx += velX * f;
        s.vy += velY * f;
      }
    }
    s.vx += (s.ox - s.x) * SPRING;
    s.vy += (s.oy - s.y) * SPRING;
    s.vx *= DAMPING;
    s.vy *= DAMPING;
    s.x  += s.vx;
    s.y  += s.vy;
    s.twinklePhase += s.twinkleSpeed;
  });
}

function drawStars() {
  stars.forEach(s => {
    const tw = 0.78 + Math.sin(s.twinklePhase) * 0.22;
    const a  = s.baseAlpha * tw;

    ctx.globalAlpha = a;
    ctx.fillStyle   = s.color;

    // Glow halo first (radial gradient — fades to transparent, no bubble)
    if (s.isBright) {
      const glowR = s.size * 5;
      const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowR);
      grd.addColorStop(0,   `rgba(255,255,255,${a * 0.55})`);
      grd.addColorStop(0.3, `rgba(255,255,255,${a * 0.15})`);
      grd.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Crisp bright core dot on top
    ctx.globalAlpha = a;
    ctx.fillStyle   = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * tw, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawHandGlow() {
  if (!handActive || handX < 0) return;
  const speed = Math.sqrt(velX * velX + velY * velY);
  const intensity = Math.min(speed * 0.01, 0.08);
  if (intensity < 0.004) return;
  const R = Math.min(W, H) * INFLUENCE_R_FRAC;
  const g = ctx.createRadialGradient(handX, handY, 0, handX, handY, R);
  g.addColorStop(0,   `rgba(160, 255, 200, ${intensity})`);
  g.addColorStop(0.5, `rgba(0, 200, 120, ${intensity * 0.3})`);
  g.addColorStop(1,   'transparent');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(handX, handY, R, 0, Math.PI * 2);
  ctx.fill();
}

// ═══════════════════════════════════════════
//  Render loop
// ═══════════════════════════════════════════
let time = 0;

function render() {
  ctx.clearRect(0, 0, W, H);

  // Deep space background — gradient darker at bottom
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,    '#000510');
  bg.addColorStop(0.45, '#010812');
  bg.addColorStop(1,    '#000308');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Aurora behind stars
  auroraShift += handActive ? velX * 0.2 : 0;
  auroraShift *= 0.98;
  drawAurora(time);

  // Stars on top
  updateStars();
  drawStars();
  drawHandGlow();

  if (!handActive) { velX *= 0.88; velY *= 0.88; }

  time += 0.01;
  requestAnimationFrame(render);
}
render();

// ═══════════════════════════════════════════
//  Camera + MediaPipe
// ═══════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', startExperience);

async function startExperience() {
  const btn  = document.getElementById('start-btn');
  const desc = document.querySelector('.ov-desc');
  btn.textContent = '載入中…';
  btn.disabled = true;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: false,
    });

    const vid = document.getElementById('vid');
    vid.srcObject = stream;
    vid.play();

    const hands = new Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.55,
    });
    hands.onResults(onHandResults);

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('cam-wrap').style.display = 'block';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('badge').style.display = 'block';

    async function frameLoop() {
      if (vid.readyState >= 2) await hands.send({ image: vid });
      requestAnimationFrame(frameLoop);
    }
    frameLoop();

  } catch (err) {
    btn.textContent = '重試';
    btn.disabled = false;
    desc.textContent = err.name === 'NotAllowedError' ? '請允許瀏覽器使用攝影鏡頭，然後重試。'
                     : err.name === 'NotFoundError'   ? '找不到攝影鏡頭，請確認裝置已連接。'
                     : '發生錯誤：' + err.message;
    console.error(err);
  }
}

// ═══════════════════════════════════════════
//  Hand results
// ═══════════════════════════════════════════
const PALM_IDX = [0, 5, 9, 13, 17];

function onHandResults(results) {
  prevHandX = handX;
  prevHandY = handY;

  if (results.multiHandLandmarks?.length > 0) {
    handActive = true;
    handLostFrames = 0;
    const lm = results.multiHandLandmarks[0];

    let sx = 0, sy = 0;
    PALM_IDX.forEach(i => { sx += lm[i].x; sy += lm[i].y; });
    handX = (1 - sx / PALM_IDX.length) * W;
    handY = (sy / PALM_IDX.length) * H;

    if (prevHandX > 0) {
      velX = velX * 0.4 + (handX - prevHandX) * 0.6;
      velY = velY * 0.4 + (handY - prevHandY) * 0.6;
    }

    document.getElementById('hand-dot').style.opacity = '1';
    drawCamPreview(lm);
  } else {
    if (++handLostFrames > 6) {
      handActive = false;
      document.getElementById('hand-dot').style.opacity = '0';
    }
  }
}

// Camera preview
const camCanvas = document.getElementById('cam-canvas');
const camCtx    = camCanvas.getContext('2d');
const CONN = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];

function drawCamPreview(lm) {
  const vid = document.getElementById('vid');
  const PW = 130, PH = 98;
  camCanvas.width = PW; camCanvas.height = PH;
  camCtx.save();
  camCtx.translate(PW, 0); camCtx.scale(-1, 1);
  camCtx.drawImage(vid, 0, 0, PW, PH);
  camCtx.restore();
  if (!lm) return;
  camCtx.strokeStyle = 'rgba(0,255,100,.55)'; camCtx.lineWidth = 1;
  CONN.forEach(([a, b]) => {
    camCtx.beginPath();
    camCtx.moveTo((1 - lm[a].x) * PW, lm[a].y * PH);
    camCtx.lineTo((1 - lm[b].x) * PW, lm[b].y * PH);
    camCtx.stroke();
  });
  lm.forEach(pt => {
    camCtx.fillStyle = 'rgba(0,255,100,.9)';
    camCtx.beginPath();
    camCtx.arc((1 - pt.x) * PW, pt.y * PH, 1.8, 0, Math.PI * 2);
    camCtx.fill();
  });
}
</script>

        a.innerHTML = `<span class="sb-num">${id}</span>${title}`;
        document.getElementById('sb-projects').appendChild(a);
      });
    });
})();
</script>
